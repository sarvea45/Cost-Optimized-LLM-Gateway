models:
  high_tier: "groq/llama-3.3-70b-versatile"
  mid_tier: "gemini/gemini-1.5-flash"
  low_tier: "groq/llama-3.1-8b-instant"
  embedding: "gemini/gemini-embedding-2"

caching:
  enabled: true
  similarity_threshold: 0.95
  ttl_seconds: 86400

routing_rules:
  - name: "complex_task_keyword"
    condition: "contains_keyword"
    keywords: ["synthesize", "analyze", "critique", "architect"]
    target_tier: "high_tier"
  - name: "long_context"
    condition: "max_tokens_exceeded"
    threshold: 1000
    target_tier: "mid_tier"
  - name: "default"
    condition: "catch_all"
    target_tier: "low_tier"

fallbacks:
  - primary: "groq/llama-3.3-70b-versatile"
    backup: "groq/llama-3.1-8b-instant"
  - primary: "groq/llama-3.1-8b-instant"
    backup: "groq/llama-3.3-70b-versatile"
